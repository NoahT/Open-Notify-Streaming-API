apiVersion: v1
kind: Service
metadata:
  name: zk-hs
  labels:
    app: zk
spec:
  publishNotReadyAddresses: true
  ports:
  - port: 2888
    name: server
  - port: 3888
    name: leader-election
  clusterIP: None
  selector:
    app: zk
---
apiVersion: v1
kind: Service
metadata:
  name: zk-cs
  labels:
    app: zk
spec:
  ports:
  - port: 2181
    name: client
  selector:
    app: zk
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zk-pdb
spec:
  selector:
    matchLabels:
      app: zk
  maxUnavailable: 1
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zk
spec:
  selector:
    matchLabels:
      app: zk
  serviceName: zk-hs
  replicas: 3
  updateStrategy:
    type: RollingUpdate
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        app: zk
        dataStore: firestore
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: "app"
                    operator: In
                    values:
                    - zk
              topologyKey: "kubernetes.io/hostname"
      containers:
        # To debug the local zookeeper instance, run 
        # kubectl exec -it zk-0 --container kubernetes-zookeeper -- sh
        # https://kubernetes.io/docs/tasks/debug/debug-application/get-shell-running-container/#opening-a-shell-when-a-pod-has-more-than-one-container
      - name: kubernetes-zookeeper
        imagePullPolicy: Always
        image: "zookeeper:latest"
        env:
          - name: ZOO_4LW_COMMANDS_WHITELIST
            valueFrom:
              configMapKeyRef:
                name: configuration
                key: ZOO_4LW_COMMANDS_WHITELIST
          - name: ZOO_MY_ID
            valueFrom:
              fieldRef:
                # We need a way to assign each Zookeeper server in the ensemble a unique ID.
                # The easiest way is to use the ordinal index, which is available with the pod-index
                # label in a StatefulSet.
                # https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#pod-index-label
                fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
          - name: ZOO_SERVERS
            valueFrom:
              configMapKeyRef:
                name: configuration
                key: ZOO_SERVERS
          - name: ZOO_CFG_EXTRA
            valueFrom:
              configMapKeyRef:
                name: configuration
                key: ZOO_CFG_EXTRA
        resources:
          requests:
            memory: "1Gi"
            cpu: "0.5"
        ports:
        - containerPort: 2181
          name: client
        - containerPort: 2888
          name: server
        - containerPort: 3888
          name: leader-election
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "echo \"ruok\" | \
              nc localhost 2181 | \
              grep imok"
          initialDelaySeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "echo \"ruok\" | \
              nc localhost 2181 | \
              grep \"imok\""
          initialDelaySeconds: 10
          timeoutSeconds: 5
      - name: ingestion-service
        image: localhost:5000/ingestion:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "0.3Gi"
            cpu: "0.4"
      securityContext:
        runAsUser: 0
