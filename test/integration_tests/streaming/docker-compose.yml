version: '2'

services:
  firestore_emulator:
    build:
      context: .
      dockerfile: Dockerfile.firestore
    environment:
      - FIRESTORE_PROJECT_ID=open-notify
      - GOOGLE_CLOUD_PROJECT=open-notify
      - GCLOUD_PROJECT=open-notify
    ports:
      - "8080:8080"
  redis:
    image: redis:latest
  streaming:
    build:
      context: ../../../src/streaming/
      dockerfile: Dockerfile
    environment:
      - FIRESTORE_EMULATOR_HOST=firestore_emulator:8080
      - FIRESTORE_PROJECT_ID=open-notify
      - GOOGLE_APPLICATION_CREDENTIALS
      - GOOGLE_CLOUD_PROJECT=open-notify
    volumes:
      - type: bind
        source: ${GOOGLE_APPLICATION_CREDENTIALS}
        target: ${GOOGLE_APPLICATION_CREDENTIALS}
    ports:
      - "8000:8000"
    networks:
      - default
      # - bridge
    depends_on:
      - firestore_emulator
      - redis
  integration_tests_streaming:
    build:
      context: ../../../
      dockerfile: test/integration_tests/streaming/Dockerfile.it
    environment:
      - FIRESTORE_EMULATOR_HOST=firestore_emulator:8080
      - FIRESTORE_PROJECT_ID=open-notify
      - GOOGLE_APPLICATION_CREDENTIALS
      - GOOGLE_CLOUD_PROJECT=open-notify
    volumes:
      - type: bind
        source: ${GOOGLE_APPLICATION_CREDENTIALS}
        target: ${GOOGLE_APPLICATION_CREDENTIALS}
    depends_on:
      - firestore_emulator
      - streaming
      - redis
networks:
  bridge:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "127.0.0.1"
