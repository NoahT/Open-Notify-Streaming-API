version: '2'

services:
  firestore_emulator:
    build:
      context: .
      dockerfile: Dockerfile.firestore
    environment:
      - FIRESTORE_PROJECT_ID=open-notify
      - GOOGLE_CLOUD_PROJECT=open-notify
      - GCLOUD_PROJECT=open-notify
    ports:
      - "8080:8080"
  streaming:
    build:
      context: ../../../src/streaming/
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
  redis:
    image: redis:latest
  integration_tests_streaming:
    build:
      context: ../../../
      dockerfile: test/integration_tests/streaming/Dockerfile.it
    depends_on:
      - firestore_emulator
      - streaming
      - redis

