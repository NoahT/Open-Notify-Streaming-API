name: ci_pipeline
permissions:
  id-token: write
  contents: read
on:
  pull_request:
    branches:
    - main
jobs:
  code_coverage:
    name: Unit test coverage
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    strategy:
      matrix:
        service:
          - name: ingestion
            requirements: src/ingestion/requirements.txt
            source_directory: src/ingestion/
            test_directory: test/unit_tests/ingestion
          - name: streaming
            requirements: src/streaming/requirements.txt
            source_directory: src/streaming/
            test_directory: test/unit_tests/streaming
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
          architecture: 'x64'
          token: ${{ github.token }}
      - run: pip install -r ${{ matrix.service.requirements }}
      - run: coverage run --rcfile=.coveragerc --source=${{ matrix.service.source_directory }} -m unittest discover ${{ matrix.service.test_directory }}
      - run: coverage xml
      - uses: orgoro/coverage@v3
        with:
          coverageFile: ./coverage.xml
          token: ${{ github.token }}
          thresholdAll: 0.7
          thresholdNew: 0 # For scaffolding and boilerplate changes, we are okay with a 0% threshold.
  integration-tests-ingestion:
    name: Ingestion service integration test regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: 'google-github-actions/auth@v3'
        with:
          project_id: 'open-notify'
          workload_identity_provider: 'projects/699210509406/locations/global/workloadIdentityPools/github-actions/providers/github-actions-provider'
      - name: Run docker compose
        uses: hoverkraft-tech/compose-action@05da55b2bb8a5a759d1c4732095044bd9018c050
        with:
          compose-file: "./test/integration_tests/ingestion/docker-compose.yml"
          services: |
            redis
            firestore_emulator
      - name: Execute integration tests
        run: |
          docker compose --file test/integration_tests/ingestion/docker-compose.yml run integration_tests_ingestion
  integration_tests_streaming:
    name: Streaming service integration test regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: 'google-github-actions/auth@v3'
        with:
          project_id: 'open-notify'
          workload_identity_provider: 'projects/699210509406/locations/global/workloadIdentityPools/github-actions/providers/github-actions-provider'
      - name: Run docker compose
        uses: hoverkraft-tech/compose-action@05da55b2bb8a5a759d1c4732095044bd9018c050
        with:
          compose-file: "./test/integration_tests/streaming/docker-compose.yml"
          services: |
            streaming
            redis
      - name: Execute integration tests
        run: |
          docker compose --file test/integration_tests/streaming/docker-compose.yml run integration_tests_streaming
  lint_check:
    name: Pylint check
    runs-on: ubuntu-latest
    needs: code_coverage
    strategy:
      matrix:
        service:
          - name: ingestion
            requirements: src/ingestion/requirements.txt
          - name: streaming
            requirements: src/streaming/requirements.txt
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
          architecture: 'x64'
          token: ${{ github.token }}
      - run: pip install -r ${{ matrix.service.requirements }}
      - run: python -m pylint src/ test/ --rcfile=.pylintrc
  terraform_validation:
    name: Validate terraform configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: 'google-github-actions/auth@v3'
        with:
          project_id: 'open-notify'
          workload_identity_provider: 'projects/699210509406/locations/global/workloadIdentityPools/github-actions/providers/github-actions-provider'
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.13.5"
      - id: init
        run: terraform init -input=false
        working-directory: ${{ github.workspace }}/infra/terraform
      - id: format
        run: terraform fmt -check -no-color
        working-directory: ${{ github.workspace }}/infra/terraform
      - id: validate
        run: terraform validate -no-color
        working-directory: ${{ github.workspace }}/infra/terraform
      - id: plan
        run: terraform plan -no-color -input=false
        working-directory: ${{ github.workspace }}/infra/terraform
      - run: echo ${{ steps.plan.outputs.stdout }}
      - run: echo ${{ steps.plan.outputs.stderr }}
      - run: echo ${{ steps.plan.outputs.exitcode }}
      # Most of this is sample code from the setup-terraform action. We ended up using
      # GITHUB_STEP_SUMMARY due to the notice of a character threshold on comments.
      # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-commands#example-of-adding-a-job-summary
      - run: echo ${{ steps.plan.outcome }} >> $GITHUB_STEP_SUMMARY
