name: ci_pipeline
on:
  pull_request:
    branches:
    - main
jobs:
  unit_tests:
    name: Unit test regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
          architecture: 'x64'
          token: ${{ github.token }}
      - run: pip install -r src/ingestion/requirements.txt
      - run: python -m unittest discover test/ --verbose
  code_coverage:
    name: Unit test coverage
    runs-on: ubuntu-latest
    needs: unit_tests
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
          architecture: 'x64'
          token: ${{ github.token }}
      - run: pip install -r src/ingestion/requirements.txt
      - run: coverage run --source=src/ -m unittest discover test/
      - run: coverage xml
      - uses: orgoro/coverage@v3
        with:
          coverageFile: ./coverage.xml
          token: ${{ github.token }}
          thresholdAll: 0.8
          thresholdNew: 0.8
  lint_check:
    name: Pylint check
    runs-on: ubuntu-latest
    needs: unit_tests
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
          architecture: 'x64'
          token: ${{ github.token }}
      - run: pip install -r src/ingestion/requirements.txt
      - run: python -m pylint src/ test/ --rcfile=.pylintrc
