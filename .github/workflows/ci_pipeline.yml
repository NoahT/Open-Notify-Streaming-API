name: ci_pipeline
permissions:
  id-token: write
  contents: read
on:
  pull_request:
    branches:
    - main
jobs:
  unit_tests:
    name: Unit test regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
          architecture: 'x64'
          token: ${{ github.token }}
      - run: pip install -r src/ingestion/requirements.txt
      - run: python -m unittest discover test/unit_tests --verbose
  integration-tests:
    name: Integration test regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: 'google-github-actions/auth@v3'
        with:
          project_id: 'open-notify'
          workload_identity_provider: 'projects/699210509406/locations/global/workloadIdentityPools/github-actions/providers/github-actions-provider'
      - name: Run docker compose
        uses: hoverkraft-tech/compose-action@05da55b2bb8a5a759d1c4732095044bd9018c050
        with:
          compose-file: "./test/integration_tests/ingestion/docker-compose.yml"
      - name: Execute integration tests
        run: |
          docker compose --file test/integration_tests/ingestion/docker-compose.yml exec integration_tests python3 -m unittest discover test/integration_tests/
  code_coverage:
    name: Unit test coverage
    runs-on: ubuntu-latest
    needs: unit_tests
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
          architecture: 'x64'
          token: ${{ github.token }}
      - run: pip install -r src/ingestion/requirements.txt
      - run: coverage run --source=src/ -m unittest discover test/unit_tests
      - run: coverage xml
      - uses: orgoro/coverage@v3
        with:
          coverageFile: ./coverage.xml
          token: ${{ github.token }}
          thresholdAll: 0.7
          thresholdNew: 0.7
  lint_check:
    name: Pylint check
    runs-on: ubuntu-latest
    needs: unit_tests
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
          architecture: 'x64'
          token: ${{ github.token }}
      - run: pip install -r src/ingestion/requirements.txt
      - run: python -m pylint src/ test/ --rcfile=.pylintrc
